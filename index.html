<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم Sizzle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ff4757;
            color: white;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 15px;
        }
        img {
            width: 100%;
            max-width: 650px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .locations {
            margin: 20px 0;
            padding: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .locations h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .btn {
            display: inline-block;
            background-color: #2ed573;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <header>
        منيو مطعم Sizzle
    </header>

    <div class="menu-container">
        
        <div class="locations">
            <h2>مواقع فروعنا</h2>
            <a href="https://maps.app.goo.gl/xPtynwPnG17FfyqL7" target="_blank" class="btn">موقع فرع حي البساتين</a>
            <a href="https://maps.app.goo.gl/MDYbZ2mGE9w6DGBw6" target="_blank" class="btn">موقع فرع الصابيات - الرواد الاثرية</a>
        </div>

        <img src="1.jpeg" alt="الصفحة الأولى من المنيو">
        <img src="2.jpeg" alt="الصفحة الثانية من المنيو">
        
    </div>

</body>
</html>
